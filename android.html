<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>escape hatch</title>
        <style>
            body {
                font-family: sans-serif;
                font-size: 2em;
                text-align: center;
                margin-top: 40px;
            }
            a {
                display: block;
                margin: 30px;
                padding: 20px;
                background: #ddd;
                text-decoration: none;
                color: #000;
            }
        </style>
    </head>
    <body>
        <a
            href="intent://#Intent;action=android.intent.action.MAIN;category=android.intent.category.HOME;end"
        >
            go home
        </a>
        <a href="intent://#Intent;action=android.settings.SETTINGS;end">
            go to settings
        </a>
    </body>
</html>
